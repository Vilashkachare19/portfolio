<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet"> <!-- Include Font Awesome -->
    <style>
        body {
            background-image: url('images/bg\ image\ black.jpg');
            background-color: #3e3e3e; /* Fallback background color for contrast */
            background-repeat: no-repeat;
            background-size: cover;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color: #fff; /* Ensures good text visibility */
            display: flex;
            min-height: 100vh;
        }

      
        /* Main Content Area */
        .main-content {
            margin-left: 350px; /* Adjust for the sidebar width */
            padding: 20px;
            width: calc(100% - 250px); /* Makes sure the content takes the rest of the space */
        }

        .content h1 {
            text-align: center;
            font-size: 40px;
            margin: 0;
            color: #fff;
        }

        .content p {
            text-align: center;
            font-size: 18px;
            margin: 10px 0;
            color: #fff; 
        }

        
       
    </style>
</head>
<body>
    <div id="navbar"></div>


    <!-- Main Content -->
    <div class="main-content">
        <div class="content">
            <h1>MYSELF,<br>Vilash Kachare</h1>
            <p>Student | Developer | Designer | Problem Solver</p>
            
           
        </div>
    </div>

        <script>
    fetch('navbar.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('navbar').innerHTML = data;
        })
        .catch(error => console.error('Error loading navbar:', error));
</script>

    
   
</body>
</html>
